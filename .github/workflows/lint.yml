name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js LTS
      uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - run: yarn install --frozen-lockfile
    - run: yarn tsc
    - run: yarn lint
